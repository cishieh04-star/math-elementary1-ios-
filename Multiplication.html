<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>九九乘法學習遊戲</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #fdf5e6; 
            padding: 20px; 
            touch-action: manipulation; 
            margin: 0;
        }
        h1 { color: #333; font-size: 28px; }
        
        /* 開始畫面專用樣式 */
        #startScreen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #fdf5e6;
        }
        .start-btn {
            padding: 20px 40px;
            font-size: 32px;
            font-weight: bold;
            background-color: #ff7f50;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .start-btn:active { transform: scale(0.95); }

        /* 遊戲畫面容器 (初始隱藏) */
        #gameScreen { display: none; }

        .equation-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 45px; 
            margin: 20px 0 10px 0; 
            font-weight: bold;
        }
        .concept-text {
            font-size: 24px;
            color: #d2691e;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .num-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0 10px; 
        }
        .visual-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            min-height: 120px;
        }
        .group-box {
            border: 3px solid #ffa07a;
            border-radius: 12px;
            padding: 8px;
            display: grid;
            gap: 5px;
            background-color: #fff;
            align-content: center;
        }
        .dot { 
            height: 16px; 
            width: 16px; 
            background-color: #ff6347; 
            border-radius: 50%; 
        }
        .box { 
            width: 80px; 
            height: 80px; 
            border: 4px dashed #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: white; 
            margin: 0 10px; 
            border-radius: 10px; 
            font-size: 35px;
        }
        #options { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            max-width: 500px; 
            margin: 10px auto; 
        }
        .option { 
            width: 75px; 
            height: 75px; 
            background: #98fb98; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            margin: 10px; 
            font-weight: bold; 
            font-size: 28px; 
            box-shadow: 2px 2px 5px #aaa; 
            transition: transform 0.1s; 
        }
        .option:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1 style="font-size: 36px; margin-bottom: 40px;">九九乘法遊戲</h1>
        <div class="start-btn" id="startBtn">開始遊戲</div>
    </div>

    <div id="gameScreen">
        <h1>請點選正確的乘法答案</h1>
        
        <div id="visualArea" class="visual-area"></div>

        <div class="equation-container">
            <div class="num-wrapper" id="numA"></div>
            ×
            <div class="num-wrapper" id="numB"></div>
            ＝
            <div class="box" id="dropTarget">?</div>
        </div>
        
        <div class="concept-text" id="conceptText"></div>
        <div id="options"></div>
    </div>

    <script>
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.85; 
            window.speechSynthesis.speak(msg);
        }

        // 點擊開始按鈕，進入遊戲並產生第一題
        document.getElementById('startBtn').onclick = () => {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            generateQuestion(); // 直接產生題目並發出聲音
        };

        // 將產生題目的邏輯打包成一個函數，取代重新整理網頁
        function generateQuestion() {
            // 清空上一題的狀態
            document.getElementById('dropTarget').innerHTML = '?';
            document.getElementById('dropTarget').style.backgroundColor = 'white';
            document.getElementById('options').innerHTML = '';

            let numA = Math.floor(Math.random() * 8) + 2; 
            let numB = Math.floor(Math.random() * 8) + 2;
            let product = numA * numB;
            
            let numBSpeech = (numB === 2) ? '兩' : numB;

            document.getElementById('numA').innerText = numA;
            document.getElementById('numB').innerText = numB;
            document.getElementById('conceptText').innerText = `（ ${numB} 個 ${numA} ）`;

            let visualHTML = '';
            let cols = Math.ceil(Math.sqrt(numA)); 
            for(let i = 0; i < numB; i++) { 
                visualHTML += `<div class="group-box" style="grid-template-columns: repeat(${cols}, 1fr);">`;
                for(let j = 0; j < numA; j++) { 
                    visualHTML += `<div class="dot"></div>`;
                }
                visualHTML += `</div>`;
            }
            document.getElementById('visualArea').innerHTML = visualHTML;

            speak(`${numA} 乘以 ${numB}，也就是 ${numBSpeech}個 ${numA}，等於多少呢？`);

            let options = [product];
            while(options.length < 6) {
                let fakeA = Math.floor(Math.random() * 8) + 2;
                let fakeB = Math.floor(Math.random() * 8) + 2;
                let fakeAns = fakeA * fakeB;
                if(!options.includes(fakeAns)) {
                    options.push(fakeAns);
                }
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(val => {
                let div = document.createElement('div');
                div.className = 'option';
                div.innerText = val;
                div.onclick = () => {
                    if (val === product) {
                        document.getElementById('dropTarget').innerHTML = val;
                        document.getElementById('dropTarget').style.backgroundColor = '#ffff99';
                        speak(`太棒了！${numA} 乘以 ${numB}，也就是 ${numBSpeech}個 ${numA} 等於 ${val}，你答對了！`);
                        
                        // 答對後等待 4.5 秒，直接呼叫函數產生下一題 (不換頁)
                        setTimeout(() => {
                            generateQuestion();
                        }, 4500);
                    } else {
                        speak("再試試看喔！");
                    }
                };
                document.getElementById('options').appendChild(div);
            });
        }
    </script>
</body>
</html>
