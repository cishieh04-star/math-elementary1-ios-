<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>看時鐘選答案</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #FFF9C4; touch-action: manipulation; }
        body { font-family: 'PingFang TC', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        #startScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFF8E1; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; }
        
        /* 新增：首頁標題樣式 */
        .home-title { font-size: 40px; font-weight: bold; color: #5D4037; }
        
        .start-btn { font-size: 32px; padding: 20px 50px; border-radius: 20px; background: #4CAF50; color: white; border: none; box-shadow: 0 6px #2E7D32; }
        
        .main-container { display: flex; flex-direction: column; align-items: center; gap: 3vh; width: 100%; max-width: 450px; }
        .title-container { background: white; padding: 10px 20px; border-radius: 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        
        .clock-container { width: 220px; height: 220px; border-radius: 50%; background: white; border: 10px solid #FF9800; position: relative; }
        
        .number { position: absolute; width: 30px; height: 30px; text-align: center; line-height: 30px; font-size: 20px; font-weight: bold; color: #5D4037; left: 50%; top: 50%; margin-left: -15px; margin-top: -15px; pointer-events: none; }
        
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 10px; }
        .hour-hand { width: 8px; height: 50px; background: #4E342E; margin-left: -4px; z-index: 2; }
        .minute-hand { width: 5px; height: 85px; background: #E64A19; margin-left: -2.5px; z-index: 3; }
        
        .options-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 90%; }
        .option-btn { background: white; border: 3px solid #FFCC80; border-radius: 12px; padding: 15px 0; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="startScreen">
        <div class="home-title">看時鐘報時間</div>
        <button class="start-btn" onclick="startGame()">開始遊戲</button>
    </div>

    <div class="main-container">
        <div class="title-container" onclick="speakText('現在是幾點鐘？')">
            <div style="font-size: 24px; font-weight: bold;">現在是幾點鐘？</div>
            <div style="font-size: 24px;">🔊</div>
        </div>

        <div class="clock-container" id="clockFace">
            <script>
                for(let i=1; i<=12; i++) {
                    let angle = (i * 30) * (Math.PI / 180);
                    let x = Math.sin(angle) * 85;
                    let y = -Math.cos(angle) * 85;
                    document.write(`<div class="number" style="transform: translate(${x}px, ${y}px)">${i}</div>`);
                }
            </script>
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
        </div>

        <div class="options-grid" id="optionsContainer"></div>
    </div>

    <script>
        let sysVoice = null;
        function loadVoices() {
            let voices = window.speechSynthesis.getVoices();
            sysVoice = voices.find(v => v.name.includes('Mei-Jia') || v.name.toLowerCase().includes('female')) || voices[0];
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speakText(text) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            if(sysVoice) msg.voice = sysVoice;
            window.speechSynthesis.speak(msg);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            let unlock = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(unlock);
            generateQuestion();
        }

        function generateQuestion() {
            let h = Math.floor(Math.random() * 12) + 1;
            let m = Math.random() < 0.5 ? 0 : 30;
            
            document.getElementById('hourHand').style.transform = `rotate(${((h % 12) * 30 + m * 0.5)}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(${m * 6}deg)`;
            
            let correctStr = `${h}:${m === 0 ? "00" : "30"}`;
            let options = [correctStr];
            while(options.length < 8) {
                let oh = Math.floor(Math.random() * 12) + 1;
                let om = Math.random() < 0.5 ? 0 : 30;
                let os = `${oh}:${om === 0 ? "00" : "30"}`;
                if(!options.includes(os)) options.push(os);
            }
            options.sort(() => Math.random() - 0.5);

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === correctStr) {
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                        speakText("太棒了！答對了！");
                        setTimeout(generateQuestion, 2000);
                    } else {
                        speakText("再算算看喔");
                    }
                };
                container.appendChild(btn);
            });
            setTimeout(() => speakText("現在是幾點鐘？"), 500);
        }
    </script>
</body>
</html>
