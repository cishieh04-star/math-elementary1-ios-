<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>加法學習遊戲</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #fffaf0; padding: 20px; touch-action: manipulation; }
        h1 { color: #333; font-size: 28px; }
        .equation-container { display: flex; justify-content: center; align-items: center; font-size: 35px; margin: 30px; }
        .num-wrapper { display: flex; flex-direction: column; align-items: center; margin: 0 8px; }
        
        /* 核心修改：設定寬度讓圓點每5個換行 */
        .dots-row { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            width: 80px; /* 5個點 * (12px點 + 4px間距) = 約 80px */
            margin-bottom: 5px; 
        }
        .dot { 
            height: 12px; width: 12px; 
            background-color: #4682b4; 
            border-radius: 50%; 
            margin: 2px; 
        }
        
        .box { width: 120px; height: 120px; border: 4px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; margin: 0 10px; border-radius: 10px; font-weight: bold; }
        #options { display: flex; flex-wrap: wrap; justify-content: center; max-width: 500px; margin: 0 auto; }
        .option { width: 70px; height: 70px; background: #FFD700; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 10px; font-weight: bold; font-size: 24px; box-shadow: 2px 2px 5px #888; transition: transform 0.1s; }
        .option:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <h1>請點選正確答案</h1>
    <div id="gameArea" class="equation-container"></div>
    <div id="options"></div>

    <script>
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            window.speechSynthesis.speak(msg);
        }

        // 修改：確保每5個點換行 (靠CSS width 控制)
        function createDots(n) {
            let dots = '<div class="dots-row">';
            for(let i=0; i<n; i++) dots += '<span class="dot"></span>';
            dots += '</div>';
            return dots;
        }

        let numA = Math.floor(Math.random() * 10) + 1;
        let numB = Math.floor(Math.random() * 9) + 1;
        let sum = numA + numB;

        document.getElementById('gameArea').innerHTML = `
            <div class="num-wrapper">${createDots(numA)}<div>${numA}</div></div>
            +
            <div class="num-wrapper">${createDots(numB)}<div>${numB}</div></div>
            =
            <div class="box" id="dropTarget">?</div>
        `;

        speak(`${numA} 加 ${numB} 等於多少？`);

        let options = [sum];
        while(options.length < 6) {
            let rand = Math.floor(Math.random() * 19) + 2;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(val => {
            let div = document.createElement('div');
            div.className = 'option';
            div.innerText = val;
            div.onclick = () => {
                if (val == sum) {
                    document.getElementById('dropTarget').innerHTML = `<div>${val}</div>${createDots(val)}`;
                    speak(`沒錯！${numA} 加 ${numB} 等於 ${val}。`);
                    setTimeout(() => location.reload(), 6000);
                } else {
                    speak("再算算看喔！");
                }
            };
            document.getElementById('options').appendChild(div);
        });
    </script>
</body>
</html>
