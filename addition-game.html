<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加法學習遊戲 - 俄羅斯方塊掉落版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #fffaf0; 
            padding: 15px; 
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        /* 開始遊戲遮罩：用於解鎖瀏覽器語音 */
        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); color: #fff; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
        }
        #startScreen div { font-size: 32px; font-weight: bold; margin-bottom: 20px; padding: 15px 30px; background: #ff9800; border-radius: 10px;}

        h1 { color: #333; font-size: 26px; margin: 10px 0; }
        
        /* 頂部狀態列 (含暫停按鈕) */
        .top-bar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 5px;
        }
        .pause-btn {
            background-color: #d97706;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .pause-btn:hover { background-color: #b45309; }

        .equation-container { display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 15px 0; }
        .num-wrapper { display: flex; flex-direction: column; align-items: center; margin: 0 6px; }
        .dots-row { display: flex; flex-wrap: wrap; justify-content: center; width: 70px; margin-bottom: 4px; }
        .dot { height: 10px; width: 10px; background-color: #4682b4; border-radius: 50%; margin: 2px; }
        .box { width: 100px; height: 100px; border: 4px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; margin: 0 8px; border-radius: 10px; font-weight: bold; font-size: 28px; }

        /* 俄羅斯方塊掉落遊戲區域容器 */
        #drop-game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 220px;
            background: #f1f5f9;
            border: 3px solid #cbd5e1;
            border-radius: 12px;
            overflow: hidden;
            box-sizing: border-box;
            margin: 10px auto;
        }

        /* 提升觸控靈敏度與尺寸的掉落選項球 */
        .falling-option {
            position: absolute;
            width: 75px;
            height: 75px;
            background: radial-gradient(circle, #fde047 60%, #eab308 100%);
            border: 3px solid #ca8a04;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #78350f;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            animation: fall linear forwards;
            z-index: 10;
        }
        .falling-option:active { transform: scale(0.9); }

        @keyframes fall {
            0% { top: -80px; }
            100% { top: 150px; }
        }

        #feedback { font-size: 18px; color: #e67e22; font-weight: bold; height: 25px; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- 點擊以解鎖語音的開始畫面 -->
    <div id="startScreen" onclick="startGame()">
        <div>▶ 點擊開始遊戲</div>
    </div>

    <h1>請點選正確答案</h1>
    
    <div class="top-bar">
        <button class="pause-btn" id="pauseBtn" onclick="togglePause()">暫停遊戲</button>
    </div>

    <div id="gameArea" class="equation-container"></div>
    
    <div id="feedback"></div>

    <!-- 掉落選項區 -->
    <div id="drop-game-container"></div>

    <script>
        let audioUnlocked = false;

        function speak(text) {
            if (!audioUnlocked) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Mei-Jia') || v.name.toLowerCase().includes('female')));
            if (femaleVoice) msg.voice = femaleVoice;
            window.speechSynthesis.speak(msg);
        }

        window.speechSynthesis.onvoiceschanged = () => {};

        function createDots(n) {
            let dots = '<div class="dots-row">';
            for(let i=0; i<n; i++) dots += '<span class="dot"></span>';
            dots += '</div>';
            return dots;
        }

        let numA, numB, sum;
        let gameInterval = null;
        let activeOptions = [];
        let isAnswered = false;
        let isPaused = false;
        let optionsArr = [];

        function startGame() {
            audioUnlocked = true;
            let unlockSpeech = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(unlockSpeech);

            document.getElementById('startScreen').style.display = 'none';
            initGame();
        }

        function initGame() {
            isAnswered = false;
            numA = Math.floor(Math.random() * 10) + 1;
            numB = Math.floor(Math.random() * 9) + 1;
            sum = numA + numB;

            document.getElementById('gameArea').innerHTML = `
                <div class="num-wrapper">${createDots(numA)}<div>${numA}</div></div>
                +
                <div class="num-wrapper">${createDots(numB)}<div>${numB}</div></div>
                =
                <div class="box" id="dropTarget">?</div>
            `;
            document.getElementById('feedback').innerText = "答案掉下來囉！";

            setTimeout(() => speak(`${numA} 加 ${numB} 等於多少？`), 300);

            let options = new Set([sum]);
            while(options.size < 4) {
                let rand = Math.floor(Math.random() * 19) + 2;
                options.add(rand);
            }
            optionsArr = Array.from(options);

            startFallingLoop();
        }

        function startFallingLoop() {
            if (gameInterval) clearInterval(gameInterval);
            
            gameInterval = setInterval(() => {
                if (isPaused || isAnswered) return;

                let randomVal = optionsArr[Math.floor(Math.random() * optionsArr.length)];
                spawnFallingOption(randomVal);
            }, 1200);
        }

        function togglePause() {
            isPaused = !isPaused;
            const pauseBtn = document.getElementById('pauseBtn');
            
            if (isPaused) {
                pauseBtn.innerText = "繼續遊戲";
                pauseBtn.style.backgroundColor = "#16a34a";
                document.getElementById('feedback').innerText = "⏸️ 遊戲已暫停，去上洗手間吧！";
                activeOptions.forEach(el => {
                    el.style.animationPlayState = 'paused';
                });
            } else {
                pauseBtn.innerText = "暫停遊戲";
                pauseBtn.style.backgroundColor = "#d97706";
                document.getElementById('feedback').innerText = "▶️ 遊戲繼續！";
                activeOptions.forEach(el => {
                    el.style.animationPlayState = 'running';
                });
            }
        }

        function spawnFallingOption(val) {
            if (isAnswered || isPaused) return;
            const container = document.getElementById('drop-game-container');
            const el = document.createElement('div');
            el.className = 'falling-option';
            el.innerText = val;

            const randomX = Math.random() * (container.clientWidth - 80);
            el.style.left = randomX + 'px';
            
            const duration = 3.5 + Math.random();
            el.style.animationDuration = duration + 's';

            if (isPaused) {
                el.style.animationPlayState = 'paused';
            }

            let isHandled = false;
            const handleSelect = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (isAnswered || isPaused || isHandled) return;
                isHandled = true;

                if (val == sum) {
                    isAnswered = true;
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    document.getElementById('dropTarget').innerHTML = `<div>${val}</div>${createDots(val)}`;
                    document.getElementById('feedback').innerText = "太棒了！👍";
                    speak(`沒錯！${numA} 加 ${numB} 等於 ${val}。`);
                    
                    clearInterval(gameInterval);
                    activeOptions.forEach(opt => opt.remove());
                    activeOptions = [];

                    // 4秒後自動載入下一題
                    setTimeout(() => {
                        if (!isPaused) initGame();
                    }, 4000);
                } else {
                    speak("再算算看喔！");
                    document.getElementById('feedback').innerText = "❌ 再試一次！";
                    el.style.transition = "opacity 0.3s";
                    el.style.opacity = "0";
                    setTimeout(() => el.remove(), 300);
                }
            };

            el.addEventListener('click', handleSelect);
            el.addEventListener('touchstart', handleSelect, { passive: false });

            el.addEventListener('animationend', () => {
                el.remove();
                activeOptions = activeOptions.filter(item => item !== el);
            });

            container.appendChild(el);
            activeOptions.push(el);
        }
    </script>
</body>
</html>
