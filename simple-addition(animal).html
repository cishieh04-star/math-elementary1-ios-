<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>烏龜算術大冒險</title>
    <style>
        body { background-color: #e0f7fa; margin: 0; padding: 2vh; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; font-family: sans-serif; overflow: hidden; }
        #status-bar { display: flex; justify-content: space-around; width: 100%; font-size: 5vh; font-weight: bold; }
        #visual-area { height: 35vh; width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5vw; flex-wrap: wrap; }
        .turtle { font-size: 7vh; transition: transform 1s, opacity 1s; }
        .entering { transform: translateX(50vw); opacity: 0; }
        .exiting { transform: translateX(50vw); opacity: 0; }
        #equation { font-size: 10vh; font-weight: bold; color: #2e7d32; }
        #feedback { font-size: 6vh; color: #d84315; font-weight: bold; height: 8vh; }
        .options-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1vw; width: 100%; max-width: 600px; padding-bottom: 2vh; }
        .btn-opt { padding: 2vh; font-size: 4vh; background: #fff; border: 0.5vh solid #81c784; border-radius: 2vh; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="timer">時間: 00:00</div>
        <div id="score">闖關: 0</div>
    </div>
    <div id="visual-area"></div>
    <div id="equation">?</div>
    <div id="feedback">請觀察烏龜變化...</div>
    <div class="options-grid" id="options-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let currentCount = 3, score = 0, startTime = Date.now();

        function startTimer() {
            setInterval(() => {
                let diff = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').innerText = `時間: ${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
            }, 1000);
        }

        async function playRound() {
            let area = document.getElementById('visual-area');
            let eq = document.getElementById('equation');
            let feedback = document.getElementById('feedback');
            
            let action = Math.random() > 0.5 ? 'add' : 'sub';
            if (currentCount >= 12) action = 'sub';
            if (currentCount <= 1) action = 'add';

            renderTurtles(currentCount);
            
            if (action === 'add') {
                eq.innerText = `${currentCount} + 1 = ?`;
                await new Promise(r => setTimeout(r, 1000));
                let t = document.createElement('div');
                t.className = 'turtle entering';
                t.innerText = '🐢';
                area.appendChild(t);
                await new Promise(r => setTimeout(r, 100));
                t.classList.remove('entering');
                currentCount++;
            } else {
                eq.innerText = `${currentCount} - 1 = ?`;
                await new Promise(r => setTimeout(r, 1000));
                area.lastElementChild.classList.add('exiting');
                await new Promise(r => setTimeout(r, 1000));
                currentCount--;
                renderTurtles(currentCount);
            }

            feedback.innerText = "現在有幾隻烏龜？";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("現在有幾隻烏龜？"));
            renderOptions();
        }

        function renderTurtles(count) {
            let area = document.getElementById('visual-area');
            area.innerHTML = '';
            for(let i = 0; i < count; i++) {
                let t = document.createElement('div');
                t.className = 'turtle';
                t.innerText = '🐢';
                area.appendChild(t);
            }
        }

        function renderOptions() {
            let container = document.getElementById('options-container');
            container.innerHTML = '';
            for(let i = 1; i <= 12; i++) {
                let btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerText = i;
                btn.onclick = () => {
                    if(i === currentCount) {
                        document.getElementById('feedback').innerText = "太棒了！👍";
                        window.speechSynthesis.speak(new SpeechSynthesisUtterance("太棒了！"));
                        confetti();
                        score++;
                        document.getElementById('score').innerText = `闖關: ${score}`;
                        setTimeout(playRound, 2000);
                    } else { btn.style.visibility = 'hidden'; }
                };
                container.appendChild(btn);
            }
        }

        startTimer();
        playRound();
    </script>
</body>
</html>
