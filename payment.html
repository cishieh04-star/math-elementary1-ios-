<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>互動付錢遊戲 (防溢出版)</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f4f4f4; font-family: sans-serif; }
  .app-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; }
  .header { height: 12%; display: flex; align-items: center; justify-content: center; background: #fff; font-size: 18px; font-weight: bold; }
  
  /* tray 增加捲軸控制，防止硬幣撐開畫面 */
  .tray { flex: 1; border: 2px dashed #aaa; background: #eef; margin: 5px; border-radius: 10px; overflow-y: auto; display: flex; flex-wrap: wrap; align-content: flex-start; padding: 5px; }
  
  .wallet { height: 18%; display: flex; justify-content: space-around; align-items: center; background: #ddd; }
  
  .coin { 
    width: 45px; height: 45px; border-radius: 50%; display: flex; 
    justify-content: center; align-items: center; font-weight: bold; 
    font-size: 16px; color: white; cursor: pointer; margin: 2px; flex-shrink: 0;
  }
  .coin-10 { background-color: #092993; border: 2px solid #061d66; }
  .coin-1 { background-color: #092993; border: 2px solid #061d66; }

  #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); color: #fff; z-index: 9999; display: flex; justify-content: center; align-items: center; }
</style>
</head>
<body>

  <div id="startScreen">
    <div style="font-size: 18px; padding: 15px; background: #092993; border-radius: 10px;">▶ 點擊開始遊戲</div>
  </div>

  <div class="app-container">
    <div class="header" id="targetDisplay">要付 ? 元</div>
    <div class="tray" id="trayCoins"></div>
    <div class="wallet">
      <div class="coin coin-10" onclick="addCoin(10)">10</div>
      <div class="coin coin-1" onclick="addCoin(1)">1</div>
    </div>
  </div>

<script>
  let totalAmount = 0, currentTarget = 0, audioUnlocked = false;

  function speakText(text) {
    if (!audioUnlocked) return;
    try { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'zh-TW'; window.speechSynthesis.speak(u); } catch (e) {}
  }

  document.getElementById('startScreen').onclick = function() {
    audioUnlocked = true; this.style.display = 'none'; nextQuestion();
  };

  function nextQuestion() {
    currentTarget = Math.floor(Math.random() * 99) + 1;
    document.getElementById('targetDisplay').innerText = "要付 " + currentTarget + " 元";
    totalAmount = 0; document.getElementById('trayCoins').innerHTML = '';
    speakText("要付 " + currentTarget + " 元");
  }

  function addCoin(val) {
    if (totalAmount + val <= currentTarget) {
      totalAmount += val;
      const c = document.createElement('div');
      c.className = "coin " + (val === 10 ? "coin-10" : "coin-1");
      c.innerText = val;
      c.onclick = function() { totalAmount -= val; this.parentNode.removeChild(this); speakText(totalAmount + " 元"); };
      document.getElementById('trayCoins').appendChild(c);
      speakText(totalAmount + " 元");

      if (totalAmount === currentTarget) {
        confetti({ particleCount: 50 });
        speakText("太棒了，答對了！");
        setTimeout(nextQuestion, 2000);
      }
    }
  }
</script>
</body>
</html>
