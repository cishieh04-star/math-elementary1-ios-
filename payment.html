<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>互動付錢遊戲 (完全兼容版)</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  body { 
    font-family: sans-serif; display: flex; flex-direction: column; 
    margin: 0; background-color: #f4f4f4; padding: 10px; min-height: 100vh;
  }
  #startScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85); color: #fff; z-index: 9999;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
  }
  .header { padding: 10px; text-align: center; background: #fff; border-radius: 10px; margin-bottom: 10px; }
  .tray { flex: 1; margin: 10px 0; border: 3px dashed #aaa; background: #eef; border-radius: 10px; position: relative; padding: 10px; }
  .coin { width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 20px; box-shadow: 2px 2px 3px rgba(0,0,0,0.3); color: white; margin: 5px; cursor: pointer; }
  .coin-10 { background-color: #092993; border: 2px solid #061d66; }
  .coin-1 { background-color: #092993; border: 2px solid #061d66; }
  .wallet { display: flex; justify-content: space-around; padding: 10px; background: #ddd; border-radius: 10px; }
</style>
</head>
<body>

  <div id="startScreen">
    <div style="font-size: 20px; padding: 15px; background: #092993; border-radius: 10px;">▶ 點擊開始遊戲</div>
  </div>

  <div class="header">
    <div id="targetDisplay">要付 ? 元</div>
  </div>

  <div class="tray" id="trayCoins"></div>

  <div class="wallet">
    <div class="coin coin-10" onclick="addCoin(10)">10</div>
    <div class="coin coin-1" onclick="addCoin(1)">1</div>
  </div>

<script>
  let totalAmount = 0, currentTarget = 0, audioUnlocked = false;

  function speakText(text) {
    if (!audioUnlocked) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-TW';
      window.speechSynthesis.speak(u);
    } catch (e) { /* 靜默處理不支援裝置 */ }
  }

  document.getElementById('startScreen').onclick = function() {
    audioUnlocked = true;
    this.style.display = 'none';
    nextQuestion();
  };

  function nextQuestion() {
    currentTarget = Math.floor(Math.random() * 99) + 1;
    document.getElementById('targetDisplay').innerText = "要付 " + currentTarget + " 元";
    totalAmount = 0;
    document.getElementById('trayCoins').innerHTML = '';
    speakText("要付 " + currentTarget + " 元");
  }

  function addCoin(val) {
    if (totalAmount + val <= currentTarget) {
      totalAmount += val;
      const c = document.createElement('div');
      c.className = "coin coin-" + val;
      c.innerText = val;
      c.onclick = function() {
        totalAmount -= val;
        this.parentNode.removeChild(this);
        speakText(totalAmount + " 元");
      };
      document.getElementById('trayCoins').appendChild(c);
      speakText(totalAmount + " 元");

      if (totalAmount === currentTarget) {
        confetti({ particleCount: 100 });
        speakText("太棒了，答對了！");
        setTimeout(nextQuestion, 2000);
      }
    }
  }
</script>
</body>
</html>
