<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<!-- 鎖死畫面縮放，確保所有裝置比例一致，不會被放大跑版 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>互動付錢遊戲 (版面鎖定與自動排序版)</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  * { box-sizing: border-box; } 
  
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; /* 終極鎖定：絕對不允許整個網頁上下滑動 */
    font-family: sans-serif; background-color: #f4f4f4;
    touch-action: manipulation; /* 優化點擊反應，消除延遲 */
  }

  #gameContainer {
    display: flex; flex-direction: column; height: 100%; width: 100%;
    max-width: 600px; margin: 0 auto; /* 在平板或電腦上自動置中，畫面更美觀 */
  }

  /* 強制解鎖語音的開始畫面 */
  #startScreen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85); color: #fff; z-index: 9999;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    cursor: pointer;
  }
  #startScreen div { font-size: 32px; font-weight: bold; margin-bottom: 20px; padding: 15px 30px; background: #ff9800; border-radius: 10px;}

  /* 頂部任務區 (固定高度) */
  .header {
    padding: 10px; text-align: center; background: #fff;
    flex: 0 0 auto; /* 固定高度，不被壓縮 */
    box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10;
  }
  .box-icon { font-size: 40px; line-height: 1; margin-bottom: 5px; }
  .target-display { font-size: 36px; font-weight: bold; color: #d32f2f; }

  /* 中部付錢區 (自動彈性縮放) */
  .tray {
    flex: 1 1 auto; /* 自動填滿中間所有剩餘空間 */
    margin: 10px; padding: 15px;
    border: 3px dashed #aaa; background: #eef; border-radius: 15px;
    
    /* 確保硬幣橫向排列，滿了自動換行，不會跑出去 */
    display: flex; flex-wrap: wrap; align-content: flex-start; gap: 6px;
    position: relative;
  }

  /* 底部錢包區 (固定高度) */
  .wallet {
    height: 110px; flex: 0 0 auto; 
    display: flex; justify-content: space-around; align-items: center;
    background: #cfd8dc; box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
    padding-bottom: env(safe-area-inset-bottom); /* 適應新款 iPhone 底部黑條 */
  }

  /* 硬幣共用樣式 */
  .coin {
    border-radius: 50%; display: flex; justify-content: center; align-items: center; 
    font-weight: bold; color: #333; cursor: pointer;
    box-shadow: 1px 3px 5px rgba(0,0,0,0.3); transition: transform 0.1s;
  }
  .coin:active { transform: scale(0.9); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  
  .coin-10 { background-color: #FFD700; border: 2px solid #DAA520; }
  .coin-1 { background-color: #F0F8FF; border: 2px solid #B0C4DE; }

  /* 💡 核心設計：錢包區的硬幣比較大，方便點擊 */
  .wallet .coin { width: 65px; height: 65px; font-size: 26px; }
  /* 💡 核心設計：付錢區的硬幣自動縮小，確保畫面上排得下所有錢 */
  .tray .coin { width: 45px; height: 45px; font-size: 20px; }

  /* 特效 */
  .celebrate { animation: pop 0.5s ease-in-out; color: #4CAF50 !important; }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
</style>
</head>
<body>

  <!-- 點擊解鎖畫面 -->
  <div id="startScreen">
    <div>▶ 點擊開始遊戲</div>
  </div>

  <div id="gameContainer">
    <!-- 任務區 -->
    <div class="header">
      <div class="box-icon">🎁</div>
      <div class="target-display">要付 <span id="displayTarget">?</span> 元</div>
    </div>

    <!-- 付錢區 -->
    <div class="tray" id="trayCoins"></div>

    <!-- 錢包區 -->
    <div class="wallet" id="wallet">
      <div class="coin coin-10" onclick="addCoin(10)">10</div>
      <div class="coin coin-1" onclick="addCoin(1)">1</div>
    </div>
  </div>

<script>
  let count10 = 0; // 記錄有幾個 10 元
  let count1 = 0;  // 記錄有幾個 1 元
  let currentTarget = 0;
  let audioUnlocked = false; 
  let isWinning = false;

  const displayTarget = document.getElementById('displayTarget');
  const trayCoins = document.getElementById('trayCoins');
  const startScreen = document.getElementById('startScreen');
  
  // 音效引擎
  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, type, duration, vol = 0.5) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = type; 
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function playDropSound() { playTone(400, 'square', 0.1, 0.2); }
  function playPickupSound() { playTone(800, 'sine', 0.1, 0.3); }
  function playErrorSound() {
    playTone(150, 'sawtooth', 0.2, 0.4);
    setTimeout(() => playTone(100, 'sawtooth', 0.3, 0.4), 150);
  }
  function playCheerSound() {
    playTone(523.25, 'sine', 0.2, 0.5); 
    setTimeout(() => playTone(659.25, 'sine', 0.2, 0.5), 150); 
    setTimeout(() => playTone(783.99, 'sine', 0.3, 0.5), 300); 
    setTimeout(() => playTone(1046.50, 'square', 0.5, 0.4), 450); 
  }

  // 語音報讀引擎
  function speakText(text, speedRate) {
    if (!audioUnlocked) return;
    window.speechSynthesis.cancel(); // 中斷前一個聲音
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-TW';
    utterance.rate = speedRate; 
    window.speechSynthesis.speak(utterance);
  }

  // 解鎖遊戲
  startScreen.addEventListener('click', () => {
    initAudio();
    let unlockSpeech = new SpeechSynthesisUtterance('');
    window.speechSynthesis.speak(unlockSpeech);

    audioUnlocked = true;
    startScreen.style.display = 'none';
    nextQuestion();
  });

  // 自動換題
  function nextQuestion() {
    isWinning = false;
    currentTarget = Math.floor(Math.random() * 99) + 1;
    displayTarget.innerText = currentTarget;
    count10 = 0;
    count1 = 0;
    renderTray(); // 清空盤面
    
    setTimeout(() => speakText(`要付，${currentTarget} 元`, 0.85), 300);
  }

  // 點擊錢包加入硬幣
  function addCoin(val) {
    if (isWinning) return;
    let totalAmount = (count10 * 10) + count1;

    if (totalAmount + val > currentTarget) {
      playErrorSound(); // 放進去會超過就發出錯誤聲
    } else {
      if (val === 10) count10++;
      else count1++;
      
      playDropSound();
      renderTray(); // 重新整理盤面
    }
  }

  // 點擊盤面退回硬幣
  function removeCoin(val) {
    if (isWinning) return;
    
    if (val === 10) count10--;
    else count1--;
    
    playPickupSound();
    renderTray(); // 重新整理盤面
  }

  // 💡 核心設計：渲染並自動整理盤面 (10元永遠在前面，1元在後面)
  function renderTray() {
    let totalAmount = (count10 * 10) + count1;
    trayCoins.innerHTML = ''; // 先清空

    // 先畫出所有的 10 元
    for(let i=0; i<count10; i++) {
      let c = document.createElement('div');
      c.className = 'coin coin-10';
      c.innerText = '10';
      c.onclick = () => removeCoin(10);
      trayCoins.appendChild(c);
    }

    // 再畫出所有的 1 元
    for(let i=0; i<count1; i++) {
      let c = document.createElement('div');
      c.className = 'coin coin-1';
      c.innerText = '1';
      c.onclick = () => removeCoin(1);
      trayCoins.appendChild(c);
    }

    // 檢查是否過關
    if (totalAmount === currentTarget && currentTarget > 0) {
      isWinning = true; 
      playCheerSound(); 
      speakText(`${totalAmount} 元，答對了！`, 1.0); 
      
      confetti({
        particleCount: 150, spread: 80, origin: { y: 0.6 },
        colors: ['#FFD700', '#ff0000', '#00ff00', '#0000ff']
      });

      setTimeout(nextQuestion, 3000);
    } else if (totalAmount < currentTarget && totalAmount > 0) {
      // 還沒過關，唸出目前累積金額
      speakText(`${totalAmount} 元`, 1.3); 
    }
  }

</script>
</body>
</html>
