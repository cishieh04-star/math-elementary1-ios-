<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>互動付錢遊戲 (包含移動摩擦音效版)</title>
<style>
  body {
    font-family: sans-serif; display: flex; flex-direction: column;
    height: 100vh; margin: 0; background-color: #f4f4f4; 
    user-select: none; -webkit-user-select: none; 
    touch-action: none; 
  }
  
  .teacher-setup {
    padding: 10px; text-align: center; background: #e0e0e0; font-size: 18px; color: #555;
  }
  .teacher-setup input {
    font-size: 18px; width: 60px; text-align: center; border: 1px solid #ccc; border-radius: 5px;
  }

  .header {
    padding: 15px; text-align: center; background: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .box-icon { font-size: 60px; line-height: 1; margin-bottom: 5px; }
  .target-display { font-size: 36px; font-weight: bold; color: #d32f2f; }
  
  .tray {
    flex: 1; margin: 20px; border: 3px dashed #aaa; background: #eef;
    border-radius: 15px; position: relative; padding: 15px;
  }
  .tray-coins {
    display: flex; flex-wrap: wrap; align-content: flex-start; gap: 10px; height: 100%;
  }
  #counter {
    font-size: 50px; font-weight: bold; color: #333;
    position: absolute; bottom: 15px; right: 20px; opacity: 0.8;
    transition: color 0.3s;
  }
  
  .wallet {
    height: 130px; background: #cfd8dc; display: flex;
    justify-content: space-around; align-items: center; padding: 10px;
    box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
  }
  
  .coin {
    width: 70px; height: 70px; border-radius: 50%; display: flex;
    justify-content: center; align-items: center; font-weight: bold;
    font-size: 26px; color: #333; box-shadow: 1px 3px 5px rgba(0,0,0,0.3);
    cursor: grab;
  }
  .coin-10 { background-color: #FFD700; border: 2px solid #DAA520; }
  .coin-1 { background-color: #F0F8FF; border: 2px solid #B0C4DE; }

  .dragging {
    position: absolute; pointer-events: none; z-index: 1000;
    transform: scale(1.1);
    box-shadow: 3px 8px 15px rgba(0,0,0,0.4);
  }

  .celebrate { animation: pop 0.5s ease-in-out; color: #4CAF50 !important; }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

  .error-shake { animation: shake 0.4s; color: #d32f2f !important; }
  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    50% { transform: translateX(10px); }
    75% { transform: translateX(-10px); }
    100% { transform: translateX(0); }
  }
</style>
</head>
<body>

  <audio id="pickupSound" src="https://actions.google.com/sounds/v1/water/water_drop.ogg" preload="auto"></audio>
  <audio id="dragSound" src="https://actions.google.com/sounds/v1/mechanisms/clock_tick.ogg" preload="auto"></audio>
  <audio id="dropSound" src="https://actions.google.com/sounds/v1/impacts/wood_click.ogg" preload="auto"></audio>
  <audio id="errorSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg" preload="auto"></audio>
  <audio id="cheerSound" src="https://actions.google.com/sounds/v1/crowds/children_cheering.ogg" preload="auto"></audio>

  <div class="teacher-setup">
    老師設定金額：<input type="number" id="targetInput" value="47" min="1" max="99"> 元
  </div>

  <div class="header">
    <div class="box-icon">🎁</div>
    <div class="target-display">要付 <span id="displayTarget">47</span> 元</div>
  </div>

  <div class="tray" id="tray">
    <div class="tray-coins" id="trayCoins"></div>
    <div id="counter">0</div>
  </div>

  <div class="wallet" id="wallet">
    <div class="coin coin-10" data-value="10">10</div>
    <div class="coin coin-1" data-value="1">1</div>
  </div>

<script>
  let totalAmount = 0;
  let audioUnlocked = false; 

  const targetInput = document.getElementById('targetInput');
  const displayTarget = document.getElementById('displayTarget');
  const counterDisplay = document.getElementById('counter');
  const trayCoins = document.getElementById('trayCoins');
  const trayElement = document.getElementById('tray');
  
  const pickupSound = document.getElementById('pickupSound');
  const dragSound = document.getElementById('dragSound');
  const dropSound = document.getElementById('dropSound');
  const errorSound = document.getElementById('errorSound');
  const cheerSound = document.getElementById('cheerSound');

  // 第一次觸控螢幕時，解鎖所有音效
  document.body.addEventListener('pointerdown', () => {
    if (!audioUnlocked) {
      pickupSound.play().then(() => pickupSound.pause()).catch(()=>{});
      dragSound.play().then(() => dragSound.pause()).catch(()=>{});
      dropSound.play().then(() => dropSound.pause()).catch(()=>{});
      errorSound.play().then(() => errorSound.pause()).catch(()=>{});
      cheerSound.play().then(() => cheerSound.pause()).catch(()=>{});
      audioUnlocked = true;
    }
  }, { once: true });

  // 播放音效共用函數
  function playSound(audioElement) {
    if(audioUnlocked) {
      audioElement.currentTime = 0; 
      audioElement.play().catch(e => console.log("音效阻擋", e));
    }
  }

  targetInput.addEventListener('input', (e) => {
    displayTarget.innerText = e.target.value;
    resetGame();
  });

  function resetGame() {
    totalAmount = 0;
    trayCoins.innerHTML = '';
    updateCounter(false); 
    counterDisplay.classList.remove('celebrate', 'error-shake');
  }

  function updateCounter(checkWin = true) {
    counterDisplay.innerText = totalAmount;
    const target = parseInt(targetInput.value);
    
    counterDisplay.classList.remove('celebrate', 'error-shake');
    void counterDisplay.offsetWidth; 

    if (checkWin && totalAmount === target && target > 0) {
      counterDisplay.classList.add('celebrate');
      playSound(cheerSound); 
    }
  }

  function showError() {
    counterDisplay.classList.remove('celebrate', 'error-shake');
    void counterDisplay.offsetWidth; 
    counterDisplay.classList.add('error-shake');
    playSound(errorSound); 
  }

  let activeCoin = null;
  // --- 用來記錄拖曳距離的變數 ---
  let lastDragX = 0;
  let lastDragY = 0;
  const DRAG_THRESHOLD = 40; // 每移動 40 像素發出一次輕微聲音，可依手感調整數字

  document.addEventListener('pointerdown', (e) => {
    if (e.target.classList.contains('coin')) {
      const val = parseInt(e.target.dataset.value);
      
      playSound(pickupSound); 
      
      if (e.target.parentNode === trayCoins) {
        e.target.remove();
        totalAmount -= val;
        updateCounter(false); 
      }

      activeCoin = document.createElement('div');
      activeCoin.className = `coin coin-${val} dragging`;
      activeCoin.dataset.value = val;
      activeCoin.innerText = val;
      document.body.appendChild(activeCoin);

      // 紀錄起始坐標點
      lastDragX = e.pageX;
      lastDragY = e.pageY;

      moveCoin(e.pageX, e.pageY);
    }
  });

  document.addEventListener('pointermove', (e) => {
    if (activeCoin) {
      moveCoin(e.pageX, e.pageY);
      
      // --- 計算移動距離並播放摩擦聲 ---
      let dx = e.pageX - lastDragX;
      let dy = e.pageY - lastDragY;
      let distance = Math.sqrt(dx * dx + dy * dy);

      // 如果移動距離超過設定的閾值，就發出滴答聲並重置座標
      if (distance > DRAG_THRESHOLD) {
        playSound(dragSound);
        lastDragX = e.pageX;
        lastDragY = e.pageY;
      }
    }
  });

  document.addEventListener('pointerup', (e) => {
    if (!activeCoin) return;

    const trayRect = trayElement.getBoundingClientRect();
    const val = parseInt(activeCoin.dataset.value);
    const target = parseInt(targetInput.value);

    if (
      e.clientX >= trayRect.left && e.clientX <= trayRect.right &&
      e.clientY >= trayRect.top && e.clientY <= trayRect.bottom
    ) {
      if (totalAmount + val > target) {
        showError(); 
      } else {
        const staticCoin = document.createElement('div');
        staticCoin.className = `coin coin-${val}`;
        staticCoin.dataset.value = val;
        staticCoin.innerText = val;
        trayCoins.appendChild(staticCoin);
        
        totalAmount += val;
        playSound(dropSound); 
        updateCounter(true);  
      }
    } else {
       playSound(pickupSound);
    }
    
    activeCoin.remove();
    activeCoin = null;
  });

  function moveCoin(x, y) {
    activeCoin.style.left = (x - 35) + 'px';
    activeCoin.style.top = (y - 35) + 'px';
  }
</script>
</body>
</html>
