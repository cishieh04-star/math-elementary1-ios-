<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>減法學習遊戲</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f8ff; padding: 20px; touch-action: manipulation; }
        h1 { color: #333; font-size: 28px; }
        /* 新增：開始按鈕樣式 */
        #startBtn { padding: 15px 30px; font-size: 20px; background-color: #ff6347; color: white; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 20px; }
        .equation-container { display: flex; justify-content: center; align-items: center; font-size: 35px; margin: 30px; }
        .num-wrapper { display: flex; flex-direction: column; align-items: center; margin: 0 8px; }
        .dots-row { display: flex; flex-wrap: wrap; justify-content: center; width: 80px; margin-bottom: 5px; }
        .dot { height: 12px; width: 12px; background-color: #ff6347; border-radius: 50%; margin: 2px; }
        .box { width: 120px; height: 120px; border: 4px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; margin: 0 10px; border-radius: 10px; font-weight: bold; }
        #options { display: flex; flex-wrap: wrap; justify-content: center; max-width: 500px; margin: 0 auto; }
        .option { width: 70px; height: 70px; background: #87ceeb; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 10px; font-weight: bold; font-size: 24px; box-shadow: 2px 2px 5px #888; transition: transform 0.1s; }
        .option:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <h1>請點選「開始」聽題目</h1>
    <button id="startBtn" onclick="startGame()">開始遊戲</button>
    <div id="gameArea" class="equation-container"></div>
    <div id="options"></div>

    <script>
        let numA, numB, diff;

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.9;
            
            // 嘗試取得語音列表並篩選女聲
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Mei-Jia') || v.name.includes('female')));
            if (femaleVoice) msg.voice = femaleVoice;
            
            window.speechSynthesis.speak(msg);
        }

        function createDots(n) {
            let dots = '<div class="dots-row">';
            for(let i=0; i<n; i++) dots += '<span class="dot"></span>';
            dots += '</div>';
            return dots;
        }

        function startGame() {
            // 產生題目
            numA = Math.floor(Math.random() * 10) + 5; 
            numB = Math.floor(Math.random() * (numA - 1)) + 1;
            diff = numA - numB;

            document.getElementById('gameArea').innerHTML = `
                <div class="num-wrapper">${createDots(numA)}<div>${numA}</div></div>
                －
                <div class="num-wrapper">${createDots(numB)}<div>${numB}</div></div>
                ＝
                <div class="box" id="dropTarget">?</div>
            `;
            
            document.getElementById('options').innerHTML = '';
            
            let options = [diff];
            while(options.length < 6) {
                let rand = Math.floor(Math.random() * 10) + 1;
                if(!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(val => {
                let div = document.createElement('div');
                div.className = 'option';
                div.innerText = val;
                div.onclick = () => {
                    if (val == diff) {
                        document.getElementById('dropTarget').innerHTML = `<div>${val}</div>${createDots(val)}`;
                        speak(`太棒了！${numA} 減 ${numB} 等於 ${val}，你答對了！`);
                        setTimeout(() => startGame(), 4000);
                    } else {
                        speak("再試試看喔！");
                    }
                };
                document.getElementById('options').appendChild(div);
            });

            speak(`${numA} 減 ${numB} 等於多少？`);
        }
    </script>
</body>
</html>
