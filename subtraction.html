<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>減法遊戲</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f8ff; padding: 10px; touch-action: manipulation; overflow-x: hidden; }
        h1 { font-size: 22px; margin-bottom: 10px; color: #333; }
        #startBtn { padding: 15px 30px; font-size: 20px; background-color: #ff6347; color: white; border: none; border-radius: 15px; cursor: pointer; transition: transform 0.1s; }
        #startBtn:active { transform: scale(0.9); }
        .equation-container { display: flex; justify-content: center; align-items: center; font-size: 30px; margin: 20px 0; flex-wrap: wrap; }
        .num-wrapper { display: flex; flex-direction: column; align-items: center; margin: 5px; }
        .dots-row { display: flex; flex-wrap: wrap; justify-content: center; width: 85px; margin-bottom: 5px; }
        .dot { height: 15px; width: 15px; background-color: #ff6347; border-radius: 50%; margin: 1px; }
        .box { width: 80px; height: 80px; border: 4px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 10px; font-weight: bold; font-size: 30px; margin: 0 5px; }
        #options { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .option { width: 60px; height: 60px; background: #87ceeb; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 8px; font-weight: bold; font-size: 24px; box-shadow: 2px 2px 5px #888; }
        
        /* 灑花效果 */
        .confetti { position: fixed; top: -10px; font-size: 20px; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body>

    <h1>請點選「開始」聽題目</h1>
    <button id="startBtn">開始遊戲</button>
    <div id="gameArea" class="equation-container"></div>
    <div id="options"></div>

    <script>
        window.onload = function() {
            document.getElementById('startBtn').addEventListener('click', startGame);
        };

        function showConfetti() {
            for (let i = 0; i < 30; i++) {
                let div = document.createElement('div');
                div.innerHTML = '🌸';
                div.className = 'confetti';
                div.style.left = Math.random() * 100 + 'vw';
                div.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 4000);
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.6;
            window.speechSynthesis.speak(msg);
        }

        function createDots(n) {
            let dots = '<div class="dots-row">';
            for(let i=0; i<n; i++) dots += '<span class="dot"></span>';
            dots += '</div>';
            return dots;
        }

        function startGame() {
            let numA = Math.floor(Math.random() * 10) + 5; 
            let numB = Math.floor(Math.random() * (numA - 1)) + 1;
            let diff = numA - numB;

            document.getElementById('gameArea').innerHTML = `
                <div class="num-wrapper">${createDots(numA)}<div>${numA}</div></div>
                －
                <div class="num-wrapper">${createDots(numB)}<div>${numB}</div></div>
                ＝
                <div class="box" id="dropTarget">?</div>
            `;
            
            document.getElementById('options').innerHTML = '';
            
            let options = [diff];
            while(options.length < 6) {
                let rand = Math.floor(Math.random() * 10) + 1;
                if(!options.includes(rand)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(val => {
                let div = document.createElement('div');
                div.className = 'option';
                div.innerText = val;
                div.onclick = function() {
                    if (parseInt(this.innerText) === diff) {
                        document.getElementById('dropTarget').innerHTML = `<div>${diff}</div>${createDots(diff)}`;
                        showConfetti(); // 觸發灑花
                        speak(`太棒了！答案是 ${diff}。`);
                        setTimeout(startGame, 5000);
                    } else {
                        speak("再算算看喔！");
                    }
                };
                document.getElementById('options').appendChild(div);
            });

            speak(`${numA} 減 ${numB} 等於多少呢？`);
        }
    </script>
</body>
</html>
