<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>看時間，轉時鐘</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #FDF6E3; touch-action: manipulation; }
        body { font-family: 'PingFang TC', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        /* 首頁畫面 */
        #homeScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FDF6E3; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .home-title { font-size: 36px; font-weight: bold; color: #5D4037; }
        .start-btn { font-size: 28px; padding: 20px 40px; border-radius: 20px; background: #8D6E63; color: white; border: none; box-shadow: 0 6px #5D4037; cursor: pointer; }

        /* 遊戲畫面 */
        .main-container { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 450px; }
        .game-title { font-size: 28px; font-weight: bold; color: #5D4037; margin-bottom: 10px; }
        .info-panel { background: #FFFFFF; padding: 20px; border-radius: 20px; text-align: center; width: 85%; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #EFEBE9; }
        .time-display { font-size: 32px; font-weight: bold; color: #4E342E; margin-bottom: 5px; }
        .turn-display { font-size: 20px; color: #795548; }
        
        .clock-container { width: 220px; height: 220px; border-radius: 50%; background: white; border: 8px solid #D7CCC8; position: relative; }
        .number { position: absolute; width: 30px; height: 30px; text-align: center; font-size: 20px; font-weight: bold; left: 50%; top: 50%; margin-left: -15px; margin-top: -15px; pointer-events: none; color: #3E2723; }
        
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 10px; }
        .hour-hand { width: 8px; height: 50px; background: #3E2723; margin-left: -4px; z-index: 2; }
        .minute-hand { width: 5px; height: 85px; background: #BF360C; margin-left: -2.5px; z-index: 3; }
        
        .btn { background: #8D6E63; color: white; padding: 15px 40px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; box-shadow: 0 4px #5D4037; }
    </style>
</head>
<body>

    <div id="homeScreen">
        <div class="home-title">「認識60進位制」互動遊戲</div>
        <button class="start-btn" onclick="startGame()">開始玩遊戲</button>
    </div>

    <div class="main-container">
        <div class="game-title">認識「60進位制」互動遊戲</div>
        <div class="info-panel">
            <div class="time-display" id="currentTime">目前時間：-- : --</div>
            <div class="turn-display" id="turnDisplay">分針轉了 0 圈</div>
        </div>
        
        <div class="clock-container" id="clockFace">
            <script>
                for(let i=1; i<=12; i++) {
                    let angle = (i * 30) * (Math.PI / 180);
                    document.write(`<div class="number" style="transform: translate(${Math.sin(angle)*85}px, ${-Math.cos(angle)*85}px)">${i}</div>`);
                }
            </script>
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
        </div>
        
        <button class="btn" onclick="add10Min()">請按鍵，向前轉 10 分鐘</button>
    </div>

    <script>
        let exactMinutes = 0;
        
        function speakText(text) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            const voices = window.speechSynthesis.getVoices();
            msg.voice = voices.find(v => v.name.includes('Mei-Jia') || v.name.includes('female')) || voices[0];
            window.speechSynthesis.speak(msg);
        }

        function startGame() {
            document.getElementById('homeScreen').style.display = 'none';
            // 解鎖語音[cite: 5]
            let unlock = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(unlock);
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('minuteHand').style.transform = `rotate(${exactMinutes * 6}deg)`;
            document.getElementById('hourHand').style.transform = `rotate(${(exactMinutes / 2)}deg)`;
            
            let totalMins = Math.floor(exactMinutes) % 720;
            let h = Math.floor(totalMins / 60) || 12;
            let m = totalMins % 60;
            
            document.getElementById('currentTime').innerText = `目前時間：${h} : ${m === 0 ? "00" : m}`;
            document.getElementById('turnDisplay').innerText = `分針轉了 ${Math.floor(Math.abs(exactMinutes) / 60)} 圈`;
        }

        function add10Min() {
            exactMinutes += 10;
            updateDisplay();
            let totalMins = Math.floor(exactMinutes) % 720;
            let h = Math.floor(totalMins / 60) || 12;
            let m = totalMins % 60;
            speakText(`現在是 ${h} 點 ${m === 0 ? "" : m + "分"}`);
        }
    </script>
</body>
</html>
