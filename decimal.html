<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位值教學互動遊戲</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #eee; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .game-board { display: flex; gap: 8px; width: 100%; max-width: 500px; height: 50vh; background: #5d4037; padding: 10px; border-radius: 10px; }
        .box { flex: 1; background: #d7ccc8; border: 3px solid #3e2723; display: flex; flex-direction: column; overflow: hidden; }
        .symbol-area { height: 80px; display: flex; justify-content: center; align-items: center; background: #fff5e6; border-bottom: 3px solid #3e2723; font-size: 40px; font-weight: bold; color: #3e2723; }
        .concrete-area { flex: 1; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start; padding: 5px; overflow-y: auto; }
        .coin { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #000; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin: 2px; flex-shrink: 0; }
        .label-container { display: flex; width: 100%; max-width: 500px; justify-content: space-around; font-weight: bold; margin-top: 5px; font-size: 18px; }
        button { margin-top: 20px; padding: 15px 30px; font-size: 20px; width: 90%; max-width: 300px; cursor: pointer; background: #fff; border-radius: 10px; border: 2px solid #333; }
    </style>
</head>
<body>

    <div class="game-board">
        <div class="box"><div class="symbol-area" id="num100">0</div><div class="concrete-area" id="slot100"></div></div>
        <div class="box"><div class="symbol-area" id="num10">0</div><div class="concrete-area" id="slot10"></div></div>
        <div class="box"><div class="symbol-area" id="num1">0</div><div class="concrete-area" id="slot1"></div></div>
    </div>
    
    <div class="label-container">
        <div>百位</div><div>十位</div><div>個位</div>
    </div>
    
    <button id="btn" onclick="process()">拉下把手 (加 1 元)</button>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // 唸出數字函數
        function speakNumber(ones, tens, hundreds) {
            window.speechSynthesis.cancel();
            let text = (hundreds > 0 ? hundreds + "百" : "") + 
                       (tens > 0 ? tens + "十" : "") + 
                       (ones > 0 ? ones : (hundreds === 0 && tens === 0 ? "零" : ""));
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        let ones = 0, tens = 0, hundreds = 0;

        function process() {
            document.getElementById('btn').disabled = true;
            ones++;
            
            if (ones === 10) {
                render(); // 先顯示滿10狀態
                setTimeout(() => {
                    ones = 0; tens++;
                    playSound(880, 0.2); setTimeout(() => playSound(1100, 0.4), 150);
                    if (tens === 10) {
                        setTimeout(() => {
                            tens = 0; hundreds++;
                            playSound(880, 0.2); setTimeout(() => playSound(1100, 0.4), 150);
                            render();
                            speakNumber(ones, tens, hundreds);
                            document.getElementById('btn').disabled = false;
                        }, 600);
                    } else {
                        render();
                        speakNumber(ones, tens, hundreds);
                        document.getElementById('btn').disabled = false;
                    }
                }, 800);
            } else {
                playSound(400, 0.1);
                render();
                speakNumber(ones, tens, hundreds);
                document.getElementById('btn').disabled = false;
            }
        }

        function render() {
            document.getElementById('num1').innerText = ones;
            document.getElementById('num10').innerText = tens;
            document.getElementById('num100').innerText = hundreds;
            
            document.getElementById('slot1').innerHTML = Array(ones).fill('<div class="coin" style="background:#d79663">1</div>').join('');
            document.getElementById('slot10').innerHTML = Array(tens).fill('<div class="coin" style="background:#b0bec5">10</div>').join('');
            document.getElementById('slot100').innerHTML = Array(hundreds).fill('<div class="coin" style="background:#ffd700">100</div>').join('');
        }
    </script>
</body>
</html>
