<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>十進位制互動遊戲</title>
    <style>
        /* 全局設定：確保不會溢出螢幕 */
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: #fdf6e3; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; margin: 0; min-height: 100dvh; box-sizing: border-box;
        }
        h1 { color: #5d4037; font-size: clamp(20px, 6vw, 32px); margin: 10px 0; }
        
        /* 遊戲板：寬度根據螢幕彈性調整 */
        .board { display: flex; gap: 2vw; margin: 2vh 0; width: 100%; max-width: 600px; }
        .column { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            border: 3px solid #5d4037; padding: 10px; border-radius: 15px; 
            background: #fff; box-sizing: border-box;
        }
        
        .pile { 
            height: 30vh; width: 100%; display: flex; flex-wrap: wrap; 
            align-content: flex-start; justify-content: center; overflow-y: auto;
        }
        .block { 
            width: clamp(20px, 8vw, 30px); height: clamp(20px, 8vw, 30px); 
            margin: 2px; border-radius: 5px; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 12px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        
        .count-text { font-size: clamp(16px, 5vw, 24px); font-weight: bold; margin-top: 10px; color: #5d4037; }
        
        /* 按鈕：手機好按的尺寸 */
        button { 
            padding: 15px 40px; font-size: 20px; cursor: pointer; 
            background: #FF9800; color: white; border: none; 
            border-radius: 15px; box-shadow: 0 5px #d35400; 
            touch-action: manipulation;
        }
        button:active { transform: translateY(5px); box-shadow: none; }
    </style>
</head>
<body>
    <h1>十進位制：積木合體遊戲</h1>
    
    <div class="board">
        <div class="column"><h3>百</h3><div class="pile" id="pile100"></div><div class="count-text" id="text100">0</div></div>
        <div class="column"><h3>十</h3><div class="pile" id="pile10"></div><div class="count-text" id="text10">0</div></div>
        <div class="column"><h3>個</h3><div class="pile" id="pile1"></div><div class="count-text" id="text1">0</div></div>
    </div>
    
    <button onclick="addOne()">加 1</button>

    <script>
        let counts = { ones: 0, tens: 0, hundreds: 0 };

        function speak(text) {
            window.speechSynthesis.cancel();
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function addOne() {
            counts.ones++;
            let msg = counts.ones + "個一";
            
            if (counts.ones === 10) {
                counts.ones = 0;
                counts.tens++;
                msg = "滿十了，合體變成一個十！";
                if (counts.tens === 10) {
                    counts.tens = 0;
                    counts.hundreds++;
                    msg = "滿十個十，合體變成一個百！";
                }
            }
            render();
            speak(msg);
        }

        function render() {
            document.getElementById('pile1').innerHTML = Array(counts.ones).fill('<div class="block" style="background:#d79663">1</div>').join('');
            document.getElementById('pile10').innerHTML = Array(counts.tens).fill('<div class="block" style="background:#b0bec5">10</div>').join('');
            document.getElementById('pile100').innerHTML = Array(counts.hundreds).fill('<div class="block" style="background:#ffd700">100</div>').join('');
            
            document.getElementById('text1').innerText = counts.ones;
            document.getElementById('text10').innerText = counts.tens;
            document.getElementById('text100').innerText = counts.hundreds;
        }
    </script>
</body>
</html>
