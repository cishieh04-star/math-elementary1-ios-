<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學冒險遊戲</title>
    <!-- 引入灑花特效庫 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            background-color: #fdfbf7; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            height: 100vh; 
            margin: 0; 
            padding: 2vh; 
            font-family: sans-serif; 
            overflow: hidden; 
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }

        #home-screen, #game-ui { 
            text-align: center; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        
        #status-bar { 
            display: flex; 
            justify-content: space-around; 
            width: 100%; 
            font-size: 5vh; 
            font-weight: bold; 
            color: #2c3e50; 
            margin-bottom: 1vh; 
            border-bottom: 0.3vh solid #ddd; 
            padding: 1vh 0; 
            align-items: center;
        }
        
        #visual-area { 
            height: 25vh; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 1vw; 
            flex-wrap: wrap; 
            overflow-y: auto; 
        }
        .dot { width: 5vh; height: 5vh; background: #ffaa55; border-radius: 50%; box-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .symbol { font-size: 7vh; font-weight: bold; color: #555; padding: 0 1vw; }
        
        #question { font-size: 10vh; font-weight: bold; color: #333; margin: 1vh 0; }
        #feedback { font-size: 6vh; color: #e67e22; font-weight: bold; height: 8vh; }
        
        /* 俄羅斯方塊掉落區域容器 */
        #drop-game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 28vh;
            background: #f1f5f9;
            border: 3px solid #cbd5e1;
            border-radius: 2vh;
            overflow: hidden;
            box-sizing: border-box;
            margin-bottom: 1vh;
        }

        /* 提升觸控靈敏度與尺寸的掉落選項球 */
        .falling-option {
            position: absolute;
            width: 75px;
            height: 75px;
            background: radial-gradient(circle, #fde047 60%, #eab308 100%);
            border: 3px solid #ca8a04;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #78350f;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            animation: fall linear forwards;
            z-index: 10;
        }
        .falling-option:active { transform: scale(0.9); }

        @keyframes fall {
            0% { top: -80px; }
            100% { top: 220px; }
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1vh;
        }

        button#start-btn, .control-btn { 
            padding: 1.5vh 3vh; 
            font-size: 3.5vh; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 2vh; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(59,130,246,0.3);
            font-weight: bold;
        }
        button#start-btn:hover, .control-btn:hover { background: #2563eb; }
        
        #pause-btn {
            background: #d97706;
        }
        #pause-btn:hover {
            background: #b45309;
        }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1 style="font-size: 8vh;">數學冒險遊戲</h1>
        <button id="start-btn" onclick="initGame()">開始玩遊戲</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="status-bar">
            <div id="timer">時間: 00:00</div>
            <div id="score">闖關: 0</div>
        </div>
        <div id="visual-area"></div>
        <div id="question">? + ? = ?</div>
        <div id="feedback"></div>
        
        <!-- 俄羅斯方塊掉落選項區 -->
        <div id="drop-game-container"></div>

        <!-- 暫停按鈕區 -->
        <div class="btn-group">
            <button id="pause-btn" class="control-btn" onclick="togglePause()">暫停遊戲</button>
        </div>
    </div>

    <script>
        let currentAns, n1, n2, score = 0;
        let gameInterval = null;
        let activeOptions = [];
        let isAnswered = false;
        let isPaused = false;
        let timerInterval = null;
        let totalSeconds = 0;
        let optionsArr = [];

        function initGame() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            score = 0;
            totalSeconds = 0;
            isPaused = false;
            document.getElementById('pause-btn').innerText = "暫停遊戲";
            document.getElementById('score').innerText = `闖關: ${score}`;
            startTimer();
            loadQuestion();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    totalSeconds++;
                    let m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                    let s = (totalSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('timer').innerText = `時間: ${m}:${s}`;
                }
            }, 1000);
        }

        // 暫停與繼續切換功能
        function togglePause() {
            isPaused = !isPaused;
            const pauseBtn = document.getElementById('pause-btn');
            
            if (isPaused) {
                pauseBtn.innerText = "繼續遊戲";
                pauseBtn.style.backgroundColor = "#16a34a";
                document.getElementById('feedback').innerText = "⏸️ 遊戲已暫停，去上洗手間吧！";
                // 將所有掉落中的選項球動畫暫停
                activeOptions.forEach(el => {
                    el.style.animationPlayState = 'paused';
                });
            } else {
                pauseBtn.innerText = "暫停遊戲";
                pauseBtn.style.backgroundColor = "#d97706";
                document.getElementById('feedback').innerText = "▶️ 遊戲繼續！加油！";
                // 恢復選項球動畫
                activeOptions.forEach(el => {
                    el.style.animationPlayState = 'running';
                });
            }
        }

        function loadQuestion() {
            isAnswered = false;
            if (!isPaused) {
                document.getElementById('feedback').innerText = "答案掉下來囉！";
            }
            
            activeOptions.forEach(el => el.remove());
            activeOptions = [];
            if (gameInterval) clearInterval(gameInterval);
            
            let baseNum = Math.floor(Math.random() * 9) + 1; 
            let isSwap = Math.random() > 0.5;
            
            n1 = isSwap ? 2 : baseNum;
            n2 = isSwap ? baseNum : 2;
            currentAns = n1 + n2;
            
            document.getElementById('question').innerText = `${n1} + ${n2} = ?`;
            renderDots(n1, n2);

            let utterance = new SpeechSynthesisUtterance(`${n1} 加 ${n2} 等於多少？`);
            utterance.lang = 'zh-TW';
            window.speechSynthesis.speak(utterance);

            let options = new Set([currentAns]);
            while(options.size < 4) options.add(Math.floor(Math.random() * 11) + 3);
            optionsArr = Array.from(options).sort(() => Math.random() - 0.5);

            let index = 0;
            gameInterval = setInterval(() => {
                if (isPaused) return; // 暫停時計時暫停
                if (isAnswered) {
                    clearInterval(gameInterval);
                    return;
                }
                if (index >= optionsArr.length) {
                    index = 0; 
                }
                spawnFallingOption(optionsArr[index]);
                index++;
            }, 1600);
        }

        function spawnFallingOption(val) {
            if (isAnswered) return;
            const container = document.getElementById('drop-game-container');
            const el = document.createElement('div');
            el.className = 'falling-option';
            el.innerText = val;

            const randomX = Math.random() * (container.clientWidth - 80);
            el.style.left = randomX + 'px';
            
            const duration = 3.5 + Math.random();
            el.style.animationDuration = duration + 's';

            if (isPaused) {
                el.style.animationPlayState = 'paused';
            }

            const handleSelect = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (isAnswered || isPaused) return;

                if(val === currentAns) {
                    isAnswered = true;
                    score++;
                    document.getElementById('score').innerText = `闖關: ${score}`;
                    document.getElementById('question').innerText = `${n1} + ${n2} = ${currentAns}`;
                    document.getElementById('feedback').innerText = "太棒了！👍";
                    renderResultDots(currentAns);
                    
                    let successMsg = new SpeechSynthesisUtterance(`答案是${currentAns}，太棒了！`);
                    successMsg.lang = 'zh-TW';
                    window.speechSynthesis.speak(successMsg);
                    
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                    
                    clearInterval(gameInterval);
                    activeOptions.forEach(opt => opt.remove());
                    activeOptions = [];

                    setTimeout(() => {
                        if (!isPaused) loadQuestion();
                    }, 3000); 
                } else {
                    let errorMsg = new SpeechSynthesisUtterance("再算算看喔！");
                    errorMsg.lang = 'zh-TW';
                    window.speechSynthesis.speak(errorMsg);
                    
                    document.getElementById('feedback').innerText = "❌ 再試一次！";
                    el.style.transition = "opacity 0.3s";
                    el.style.opacity = "0";
                    setTimeout(() => el.remove(), 300);
                }
            };

            el.addEventListener('click', handleSelect);
            el.addEventListener('touchstart', handleSelect);

            el.addEventListener('animationend', () => {
                el.remove();
                activeOptions = activeOptions.filter(item => item !== el);
            });

            container.appendChild(el);
            activeOptions.push(el);
        }

        function renderDots(num1, num2) {
            let area = document.getElementById('visual-area');
            area.innerHTML = '';
            for(let i=0; i<num1; i++) area.appendChild(createDot());
            area.innerHTML += '<span class="symbol">+</span>';
            for(let i=0; i<num2; i++) area.appendChild(createDot());
        }

        function renderResultDots(res) {
            let area = document.getElementById('visual-area');
            area.innerHTML = '';
            for(let i=0; i<res; i++) area.appendChild(createDot());
        }

        function createDot() {
            let d = document.createElement('div');
            d.className = 'dot';
            return d;
        }
    </script>
</body>
</html>
