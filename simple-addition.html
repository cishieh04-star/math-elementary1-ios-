<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學冒險遊戲</title>
    <style>
        /* 基礎版面設定：確保置中與手機適應性 */
        body { 
            background-color: #fdfbf7; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; height: 100vh; margin: 0; padding: 10px; 
            font-family: sans-serif; overflow: hidden; box-sizing: border-box;
        }
        #visual-area { height: 15%; display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .dot { width: 30px; height: 30px; background: #ffaa55; border-radius: 50%; box-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .symbol { font-size: 25px; font-weight: bold; color: #555; padding: 0 5px; }
        #question { font-size: 45px; font-weight: bold; color: #333; margin: 10px 0; }
        
        /* 選項區塊：置中且適應各種螢幕寬度 */
        .options-container-wrapper { display: flex; justify-content: center; width: 100%; padding-bottom: 20px; }
        .options-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            width: 100%; max-width: 400px;
        }
        .btn-opt { padding: 15px; font-size: 25px; background: #fff; border: 2px solid #7fc8f8; border-radius: 12px; cursor: pointer; text-align: center; }
        
        #start-btn { padding: 20px 40px; font-size: 30px; background: #ffaa55; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <button id="start-btn" onclick="initGame()">開始遊戲</button>
    <div id="game-ui" style="display:none; text-align:center; width: 100%;">
        <div id="visual-area"></div>
        <div id="question">? + ? = ?</div>
        <div class="options-container-wrapper">
            <div class="options-grid" id="options-container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let currentAns;
        function initGame() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            // 隨機產生 X+1 或 1+X 組合 (總和不超過 11)
            let n1, n2;
            if (Math.random() > 0.5) { n1 = Math.floor(Math.random() * 9) + 1; n2 = 1; }
            else { n1 = 1; n2 = Math.floor(Math.random() * 9) + 1; }
            currentAns = n1 + n2;
            
            document.getElementById('question').innerText = `${n1} + ${n2} = ?`;
            
            // 語音朗讀
            let utterance = new SpeechSynthesisUtterance(`${n1} 加 ${n2} 等於多少？`);
            window.speechSynthesis.speak(utterance);

            // 渲染上方圓點
            let area = document.getElementById('visual-area');
            area.innerHTML = '';
            for(let i=0; i<n1; i++) area.appendChild(createDot());
            area.innerHTML += '<span class="symbol">+</span>';
            for(let i=0; i<n2; i++) area.appendChild(createDot());

            // 產生 6 個隨機選項
            let container = document.getElementById('options-container');
            container.innerHTML = '';
            let options = new Set([currentAns]);
            while(options.size < 6) options.add(Math.floor(Math.random() * 10) + 2);
            
            Array.from(options).sort(() => Math.random() - 0.5).forEach(num => {
                let btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerText = num;
                btn.onclick = () => { 
                    if(num === currentAns) { 
                        confetti(); // 撒花特效
                        new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3').play(); 
                        setTimeout(loadQuestion, 2000); 
                    } else { 
                        btn.style.visibility = 'hidden'; // 選錯則該選項隱藏
                        new Audio('https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3').play(); 
                    }
                };
                container.appendChild(btn);
            });
        }

        function createDot() {
            let d = document.createElement('div');
            d.className = 'dot';
            return d;
        }
    </script>
</body>
</html>
