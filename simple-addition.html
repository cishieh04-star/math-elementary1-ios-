<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #fdfbf7; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        
        /* 嚴格的水平排列區塊 */
        #visual-container { display: flex; align-items: center; justify-content: center; gap: 10px; height: 150px; margin-bottom: 20px; }
        .dot-group { display: flex; flex-wrap: wrap; gap: 5px; width: auto; align-items: center; justify-content: center; }
        .dot { width: 40px; height: 40px; background: #ffaa55; border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .symbol { font-size: 40px; font-weight: bold; color: #555; padding: 0 10px; }

        #equation { font-size: 80px; font-weight: bold; color: #333; margin-top: 20px; }
        button { margin-top: 40px; padding: 20px 60px; font-size: 24px; background: #7fc8f8; color: white; border: none; border-radius: 50px; box-shadow: 0 6px #5aaee4; cursor: pointer; }
    </style>
</head>
<body>

    <div id="visual-container">
        <div id="dots-n1" class="dot-group"></div>
        <div class="symbol">+</div>
        <div id="dots-n2" class="dot-group"></div>
        <div class="symbol">=</div>
        <div id="dots-res" class="dot-group"></div>
    </div>
    
    <div id="equation">1 + 1 = 2</div>
    <button onclick="nextStep()">下一題</button>

    <script>
        let step = 0;
        const data = [
            {n1: 1, n2: 1, res: 2, eq: "1 + 1 = 2"},
            {n1: 2, n2: 1, res: 3, eq: "2 + 1 = 3"},
            {n1: 3, n2: 1, res: 4, eq: "3 + 1 = 4"},
            {n1: 4, n2: 1, res: 5, eq: "4 + 1 = 5"},
            {n1: 5, n2: 1, res: 6, eq: "5 + 1 = 6"},
            {n1: 6, n2: 1, res: 7, eq: "6 + 1 = 7"},
            {n1: 7, n2: 1, res: 8, eq: "7 + 1 = 8"},
            {n1: 8, n2: 1, res: 9, eq: "8 + 1 = 9"},
            {n1: 9, n2: 1, res: 10, eq: "9 + 1 = 10"}
        ];

        function nextStep() {
            if (step < data.length) {
                let d = data[step];
                
                // 1. 語音朗讀：強制觸發
                let utterance = new SpeechSynthesisUtterance(d.eq.replace("+", "加").replace("=", "等於"));
                window.speechSynthesis.cancel(); // 取消上一次未唸完的
                window.speechSynthesis.speak(utterance);
                
                // 2. 更新算式文字
                document.getElementById('equation').innerText = d.eq;
                
                // 3. 嚴格區塊渲染
                renderDots('dots-n1', d.n1);
                renderDots('dots-n2', d.n2);
                renderDots('dots-res', d.res);
                
                step++;
            } else {
                step = 0;
                location.reload();
            }
        }

        function renderDots(id, count) {
            let container = document.getElementById(id);
            container.innerHTML = '';
            for(let i=0; i<count; i++) {
                let d = document.createElement('div');
                d.className = 'dot';
                container.appendChild(d);
            }
        }
        
        // 初始化第一次顯示
        nextStep();
    </script>
</body>
</html>
