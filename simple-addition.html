<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學冒險遊戲</title>
    <style>
        body { background-color: #fdfbf7; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #visual-area { height: 150px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .dot { width: 45px; height: 45px; background: #ffaa55; border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .symbol { font-size: 40px; font-weight: bold; color: #555; padding: 0 10px; }
        #question { font-size: 70px; font-weight: bold; color: #333; margin-bottom: 30px; }
        .options-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 400px; }
        .btn-opt { padding: 20px; font-size: 30px; background: #fff; border: 3px solid #7fc8f8; border-radius: 20px; cursor: pointer; }
        #start-btn { padding: 30px 60px; font-size: 40px; background: #ffaa55; color: white; border: none; border-radius: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <button id="start-btn" onclick="initGame()">開始遊戲</button>
    <div id="game-ui" style="display:none; text-align:center;">
        <div id="visual-area"></div>
        <div id="question">? + ? = ?</div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let currentAns;
        function initGame() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            // 隨機選數，確保總和不超過 11
            let n1, n2;
            if (Math.random() > 0.5) {
                n1 = Math.floor(Math.random() * 9) + 1;
                n2 = 1;
            } else {
                n1 = 1;
                n2 = Math.floor(Math.random() * 9) + 1;
            }
            currentAns = n1 + n2;
            
            document.getElementById('question').innerText = `${n1} + ${n2} = ?`;
            
            // 語音朗讀
            let utterance = new SpeechSynthesisUtterance(`${n1} 加 ${n2} 等於多少？`);
            window.speechSynthesis.speak(utterance);

            // 渲染圓點
            let area = document.getElementById('visual-area');
            area.innerHTML = '';
            for(let i=0; i<n1; i++) area.appendChild(createDot());
            area.innerHTML += '<span class="symbol">+</span>';
            for(let i=0; i<n2; i++) area.appendChild(createDot());

            // 產生 8 個選項 (限制在 2-11 之間，且不重複)
            let container = document.getElementById('options-container');
            container.innerHTML = '';
            let options = new Set([currentAns]);
            while(options.size < 8) {
                let rand = Math.floor(Math.random() * 10) + 2;
                options.add(rand);
            }
            
            Array.from(options).sort(() => Math.random() - 0.5).forEach(num => {
                let btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerText = num;
                btn.onclick = () => checkAnswer(num, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(ans, btn) {
            if (ans === currentAns) {
                confetti();
                new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3').play();
                setTimeout(loadQuestion, 2000);
            } else {
                btn.style.visibility = 'hidden'; // 點錯隱藏，不產生其他混淆
                new Audio('https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3').play();
            }
        }

        function createDot() {
            let d = document.createElement('div');
            d.className = 'dot';
            return d;
        }
    </script>
</body>
</html>
