<style>
    /* 修正 body 設定，改用 min-height 允許內容撐開並可捲動 */
    body { 
        background-color: #fdfbf7; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        min-height: 100vh; /* 改為最小高度 */
        margin: 0; 
        padding: 2vh; 
        font-family: sans-serif; 
        box-sizing: border-box;
    }
    
    /* 確保容器不再強制撐滿整個螢幕導致無法捲動 */
    #home-screen, #game-ui { 
        text-align: center; 
        width: 100%; 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
    }

    /* 縮小點點區域高度，避免擠壓到下方選項 */
    #visual-area { height: auto; min-height: 25vh; width: 100%; display: flex; align-items: center; justify-content: center; gap: 1vw; flex-wrap: wrap; margin: 1vh 0; }
    
    /* 選項區塊：調整間距，避免舊機型塞不下 */
    .options-grid { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap: 1.5vw; 
        width: 100%; 
        max-width: 500px;
        margin-top: 1vh;
        padding-bottom: 2vh;
    }
    
    /* 稍微縮小按鈕 padding，騰出顯示空間 */
    .btn-opt { padding: 2vh; font-size: 4vh; background: #fff; border: 0.5vh solid #7fc8f8; border-radius: 2vh; cursor: pointer; }
</style>
