<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>烏龜算術大冒險</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background-color: #fdfbf7; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        #home-screen, #game-ui { 
            text-align: center; width: 100%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding-top: 20px;
        }
        #start-btn { padding: 20px 40px; font-size: 30px; background: #7fc8f8; color: white; border: none; border-radius: 20px; cursor: pointer; }
        
        #status-bar { display: flex; justify-content: space-around; width: 100%; font-size: 24px; font-weight: bold; color: #2c3e50; padding: 10px 0; border-bottom: 2px solid #ddd; }
        #visual-area { width: 90%; height: 180px; display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; margin: 10px 0; }
        .turtle { font-size: 50px; transition: transform 1s, opacity 1s; }
        .entering { transform: translateX(50vw); opacity: 0; }
        .exiting { transform: translateX(50vw); opacity: 0; }
        
        #equation { font-size: 60px; font-weight: bold; color: #2e7d32; margin: 10px 0; }
        #feedback { font-size: 40px; color: #e67e22; font-weight: bold; height: 60px; }
        
        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; max-width: 400px; padding-bottom: 20px; }
        .btn-opt { padding: 15px; font-size: 30px; background: #fff; border: 2px solid #7fc8f8; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1 style="font-size: 50px;">烏龜算術冒險</h1>
        <button id="start-btn" onclick="initGame()">開始遊戲</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="status-bar">
            <div id="timer">時間: 00:00</div>
            <div id="score">闖關: 0</div>
        </div>
        <div id="visual-area"></div>
        <div id="equation">?</div>
        <div id="feedback"></div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let currentCount = 3, score = 0, startTime;

        function initGame() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            startTime = Date.now();
            startTimer();
            playRound();
        }

        function startTimer() {
            setInterval(() => {
                let diff = Math.floor((Date.now() - startTime) / 1000);
                let m = Math.floor(diff / 60).toString().padStart(2, '0');
                let s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `時間: ${m}:${s}`;
            }, 1000);
        }

        async function playRound() {
            let area = document.getElementById('visual-area');
            let eq = document.getElementById('equation');
            let feedback = document.getElementById('feedback');
            
            let action = Math.random() > 0.5 ? 'add' : 'sub';
            if (currentCount >= 12) action = 'sub';
            if (currentCount <= 1) action = 'add';

            renderTurtles(currentCount);
            
            if (action === 'add') {
                eq.innerText = `${currentCount} + 1 = ?`;
                await new Promise(r => setTimeout(r, 1000));
                let t = document.createElement('div');
                t.className = 'turtle entering';
                t.innerText = '🐢';
                area.appendChild(t);
                await new Promise(r => setTimeout(r, 100));
                t.classList.remove('entering');
                currentCount++;
            } else {
                eq.innerText = `${currentCount} - 1 = ?`;
                await new Promise(r => setTimeout(r, 1000));
                area.lastElementChild.classList.add('exiting');
                await new Promise(r => setTimeout(r, 1000));
                currentCount--;
                renderTurtles(currentCount);
            }

            feedback.innerText = "現在有幾隻烏龜？";
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("現在有幾隻烏龜？"));
            renderOptions();
        }

        function renderTurtles(count) {
            let area = document.getElementById('visual-area');
            area.innerHTML = '';
            for(let i = 0; i < count; i++) {
                let t = document.createElement('div');
                t.className = 'turtle';
                t.innerText = '🐢';
                area.appendChild(t);
            }
        }

        function renderOptions() {
            let container = document.getElementById('options-container');
            container.innerHTML = '';
            for(let i = 1; i <= 12; i++) {
                let btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerText = i;
                btn.onclick = () => {
                    if(i === currentCount) {
                        document.getElementById('feedback').innerText = "太棒了！👍";
                        window.speechSynthesis.speak(new SpeechSynthesisUtterance("太棒了！"));
                        confetti();
                        score++;
                        document.getElementById('score').innerText = `闖關: ${score}`;
                        setTimeout(playRound, 2000);
                    } else { btn.style.visibility = 'hidden'; }
                };
                container.appendChild(btn);
            }
        }
    </script>
</body>
</html>
