<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學冒險遊戲</title>
    <style>
        body { 
            background-color: #fdfbf7; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; height: 100vh; margin: 0; padding: 2vh; 
            font-family: sans-serif; overflow: hidden; box-sizing: border-box;
        }
        #home-screen, #game-ui { text-align: center; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        #status-bar { display: flex; justify-content: space-around; width: 100%; font-size: 6vh; font-weight: bold; color: #2c3e50; margin-bottom: 2vh; border-bottom: 0.3vh solid #ddd; padding: 1vh 0; }
        
        #visual-area { height: 30vh; width: 100%; display: flex; align-items: center; justify-content: center; gap: 1vw; flex-wrap: wrap; overflow-y: auto; }
        .dot { width: 6vh; height: 6vh; background: #ffaa55; border-radius: 50%; box-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .symbol { font-size: 8vh; font-weight: bold; color: #555; padding: 0 1vw; }
        
        #question { font-size: 12vh; font-weight: bold; color: #333; margin: 2vh 0; }
        #feedback { font-size: 8vh; color: #e67e22; font-weight: bold; height: 10vh; }
        
        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2vw; width: 100%; max-width: 500px; }
        .btn-opt { padding: 3vh; font-size: 5vh; background: #fff; border: 0.5vh solid #7fc8f8; border-radius: 2vh; cursor: pointer; }
        button#start-btn { padding: 3vh 6vh; font-size: 6vh; background: #7fc8f8; color: white; border: none; border-radius: 3vh; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1 style="font-size: 8vh;">數學冒險遊戲</h1>
        <button id="start-btn" onclick="initGame()">開始玩遊戲</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="status-bar">
            <div id="timer">時間: 00:00</div>
            <div id="score">闖關: 0</div>
        </div>
        <div id="visual-area"></div>
        <div id="question">? + ? = ?</div>
        <div id="feedback"></div>
        <div class="options-grid" id="options-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        let currentAns, n1, n2, score = 0, startTime;

        function initGame() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            startTime = Date.now();
            startTimer();
            loadQuestion();
        }

        function startTimer() {
            setInterval(() => {
                let diff = Math.floor((Date.now() - startTime) / 1000);
                let m = Math.floor(diff / 60).toString().padStart(2, '0');
                let s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `時間: ${m}:${s}`;
            }, 1000);
        }

        function loadQuestion() {
            document.getElementById('feedback').innerText = "";
            if (Math.random() > 0.5) { n1 = Math.floor(Math.random() * 9) + 1; n2 = 1; }
            else { n1 = 1; n2 = Math.floor(Math.random() * 9) + 1; }
            currentAns = n1 + n2;
            
            document.getElementById('question').innerText = `${n1} + ${n2} = ?`;
            renderDots(n1, n2);

            // 語音朗讀題目
            let utterance = new SpeechSynthesisUtterance(`${n1} 加 ${n2} 等於多少？`);
            window.speechSynthesis.speak(utterance);

            let container = document.getElementById('options-container');
            container.innerHTML = '';
            let options = new Set([currentAns]);
            while(options.size < 6) options.add(Math.floor(Math.random() * 10) + 2);
            
            Array.from(options).sort(() => Math.random() - 0.5).forEach(num => {
                let btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerText = num;
                btn.onclick = () => { 
                    if(num === currentAns) {
                        score++;
                        document.getElementById('score').innerText = `闖關: ${score}`;
                        document.getElementById('question').innerText = `${n1} + ${n2} = ${currentAns}`;
                        document.getElementById('feedback').innerText = "太棒了！👍";
                        renderResultDots(currentAns);
                        
                        // 答對後的鼓勵語音
                        let successMsg = new SpeechSynthesisUtterance(`答案是${currentAns}，太棒了！`);
                        window.speechSynthesis.speak(successMsg);
                        
                        confetti();
                        setTimeout(loadQuestion, 3000); 
                    } else { 
                        btn.style.visibility = 'hidden';
                    }
                };
                container.appendChild(btn);
            });
        }

        function renderDots(num1, num2) {
            let area = document.getElementById('visual-area');
            area.innerHTML = '';
            for(let i=0; i<num1; i++) area.appendChild(createDot());
            area.innerHTML += '<span class="symbol">+</span>';
            for(let i=0; i<num2; i++) area.appendChild(createDot());
        }

        function renderResultDots(res) {
            let area = document.getElementById('visual-area');
            area.innerHTML = '';
            for(let i=0; i<res; i++) area.appendChild(createDot());
        }

        function createDot() {
            let d = document.createElement('div');
            d.className = 'dot';
            return d;
        }
    </script>
</body>
</html>
