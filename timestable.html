<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>九九乘法學習遊戲</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; background-color: #fdf5e6; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px;
        }
        #startScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { padding: 20px 40px; font-size: 32px; font-weight: bold; background-color: #ff7f50; color: white; border-radius: 20px; cursor: pointer; box-shadow: 0px 5px 15px rgba(0,0,0,0.2); }
        #gameScreen { display: none; width: 100%; max-width: 600px; }
        .equation-container { display: flex; justify-content: center; align-items: center; font-size: 40px; margin: 20px 0; font-weight: bold; }
        .visual-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; min-height: 100px; }
        .group-box { border: 3px solid #ffa07a; border-radius: 12px; padding: 5px; display: grid; gap: 5px; background-color: #fff; }
        .dot { height: 16px; width: 16px; background-color: #ff6347; border-radius: 50%; }
        .box { width: 70px; height: 70px; border: 4px dashed #333; display: flex; align-items: center; justify-content: center; background: white; border-radius: 10px; font-size: 30px; }
        #options { display: flex; flex-wrap: wrap; justify-content: center; margin: 10px auto; }
        .option { width: 70px; height: 70px; background: #98fb98; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 8px; font-weight: bold; font-size: 24px; box-shadow: 2px 2px 5px #aaa; }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1 style="font-size: 32px;">九九乘法遊戲</h1>
        <div class="start-btn" id="startBtn">開始遊戲</div>
    </div>

    <div id="gameScreen">
        <h1 style="font-size: 24px;">請點選正確答案</h1>
        <div id="visualArea" class="visual-area"></div>
        <div class="equation-container">
            <div id="numA"></div> × <div id="numB"></div> ＝ <div class="box" id="dropTarget">?</div>
        </div>
        <div id="conceptText" style="font-size: 20px; color:#d2691e; font-weight:bold; margin-bottom:20px;"></div>
        <div id="options"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script>
        // 修改後的語音函式：移除所有複雜篩選，回歸最穩定的系統原生發音
        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            
            // 強制設定為繁體中文，讓系統自動對應到裝置最標準的中文語音
            msg.lang = 'zh-TW';
            msg.rate = 0.9;
            
            // 設定結束後觸發的 callback
            msg.onend = callback;
            
            // 執行發音
            window.speechSynthesis.speak(msg);
        }

        document.getElementById('startBtn').onclick = () => {
            // 解鎖語音引擎
            const silent = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(silent);
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            generateQuestion();
        };

        function generateQuestion() {
            document.getElementById('dropTarget').innerText = '?';
            document.getElementById('options').innerHTML = '';

            let numA = Math.floor(Math.random() * 8) + 2; 
            let numB = Math.floor(Math.random() * 8) + 2;
            let product = numA * numB;
            
            document.getElementById('numA').innerText = numA;
            document.getElementById('numB').innerText = numB;
            document.getElementById('conceptText').innerText = `（ ${numB} 個 ${numA} ）`;

            let visualHTML = '';
            let cols = Math.ceil(Math.sqrt(numA)); 
            for(let i = 0; i < numB; i++) { 
                visualHTML += `<div class="group-box" style="grid-template-columns: repeat(${cols}, 1fr);">`;
                for(let j = 0; j < numA; j++) visualHTML += `<div class="dot"></div>`;
                visualHTML += `</div>`;
            }
            document.getElementById('visualArea').innerHTML = visualHTML;

            // 語音發聲：直接由系統調用最穩定的語音
            speak(`${numA} 乘以 ${numB}，等於多少呢？`);

            let options = [product];
            while(options.length < 6) {
                let fake = (Math.floor(Math.random() * 8) + 2) * (Math.floor(Math.random() * 8) + 2);
                if(!options.includes(fake)) options.push(fake);
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(val => {
                let div = document.createElement('div');
                div.className = 'option';
                div.innerText = val;
                div.onclick = () => {
                    if (val === product) {
                        document.getElementById('dropTarget').innerText = val;
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                        speak(`太棒了！${val}。答對了！`, generateQuestion);
                    } else {
                        speak("再試試看喔！");
                    }
                };
                document.getElementById('options').appendChild(div);
            });
        }
    </script>
</body>
</html>
