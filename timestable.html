<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>九九乘法互動遊戲</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #fdf5e6; padding: 20px; touch-action: manipulation; margin: 0; overflow-x: hidden; }
        h1 { color: #333; font-size: 28px; }
        #startScreen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #fdf5e6; }
        .start-btn { padding: 20px 40px; font-size: 32px; font-weight: bold; background-color: #ff7f50; color: white; border-radius: 20px; cursor: pointer; box-shadow: 0px 5px 15px rgba(0,0,0,0.2); }
        #gameScreen { display: none; }
        .equation-container { display: flex; justify-content: center; align-items: center; font-size: 45px; margin: 20px 0 10px 0; font-weight: bold; }
        .concept-text { font-size: 24px; color: #d2691e; margin-bottom: 20px; font-weight: bold; }
        .visual-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 20px; min-height: 120px; }
        .group-box { border: 3px solid #ffa07a; border-radius: 12px; padding: 8px; display: grid; gap: 5px; background-color: #fff; align-content: center; width: 60px; height: 100px; }
        .dot { height: 14px; width: 14px; background-color: #ff6347; border-radius: 50%; }
        .box { width: 120px; height: 80px; border: 4px dashed #333; display: flex; align-items: center; justify-content: center; background: white; margin: 0 10px; border-radius: 10px; font-size: 40px; }
        #options { display: flex; flex-wrap: wrap; justify-content: center; max-width: 500px; margin: 10px auto; }
        .option { width: 75px; height: 75px; background: #98fb98; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 10px; font-weight: bold; font-size: 28px; transition: 0.2s; }
        
        /* 最傳統、最安全的 CSS 動畫，取代會讓 iOS 當機的 JS 寫法 */
        @keyframes fall {
            0% { transform: translateY(0vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 999; top: -10px; animation: fall 1.5s linear forwards; }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1>九九乘法互動遊戲</h1>
        <div class="start-btn" id="startBtn">開始遊戲</div>
    </div>

    <div id="gameScreen">
        <h1>九九乘法互動遊戲</h1>
        <div id="visualArea" class="visual-area"></div>
        <div class="equation-container">
            <span id="equationDisplay">4 × 4 ＝</span>
            <div class="box" id="dropTarget">?</div>
        </div>
        <div class="concept-text" id="conceptText"></div>
        <div id="options"></div>
    </div>

    <script>
        // 加入防連點鎖，避免狂按導致當機
        let isProcessing = false; 
        // 判斷瀏覽器是否支援語音，防止在 LINE 裡面開起來死機
        let hasVoice = ('speechSynthesis' in window);

        function speak(text) {
            if (!hasVoice) return; // 如果環境不支援，直接跳過不報錯
            
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 0.85; 
            
            let voices = window.speechSynthesis.getVoices();
            let appleVoice = voices.find(v => v.name.includes('Mei-Jia') || v.name.includes('Ting-Ting') || v.name.includes('Hanhan'));
            if (appleVoice) {
                msg.voice = appleVoice;
            }

            window.speechSynthesis.speak(msg);
        }

        function triggerConfetti() {
            for (let i = 0; i < 40; i++) {
                let c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#f00', '#0f0', '#00f', '#ff0', '#f0f'][Math.floor(Math.random()*5)];
                // 加上一點時間差，讓撒花更自然
                c.style.animationDelay = (Math.random() * 0.5) + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 2500); // 確保動畫播完後刪除
            }
        }

        document.getElementById('startBtn').onclick = () => {
            if (hasVoice) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            }
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            generateQuestion();
        };

        function generateQuestion() {
            // 重新出題時解開鎖定
            isProcessing = false;
            document.getElementById('dropTarget').innerHTML = '?';
            document.getElementById('options').innerHTML = '';

            let numA = Math.floor(Math.random() * 8) + 2; 
            let numB = Math.floor(Math.random() * 8) + 2;
            let product = numA * numB;
            
            document.getElementById('equationDisplay').innerText = `${numA} × ${numB} ＝`;
            document.getElementById('conceptText').innerText = `（ ${numB} 個 ${numA} ）`;

            let visualHTML = '';
            for(let i = 0; i < numB; i++) { 
                visualHTML += `<div class="group-box" style="grid-template-columns: repeat(2, 1fr);">`;
                for(let j = 0; j < numA; j++) { visualHTML += `<div class="dot"></div>`; }
                visualHTML += `</div>`;
            }
            document.getElementById('visualArea').innerHTML = visualHTML;

            speak(`${numA} 乘以 ${numB}，等於多少呢？`);

            let options = [product];
            while(options.length < 6) {
                let ans = (Math.floor(Math.random() * 8) + 2) * (Math.floor(Math.random() * 8) + 2);
                if(!options.includes(ans)) options.push(ans);
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(val => {
                let div = document.createElement('div');
                div.className = 'option';
                div.innerText = val;
                div.onclick = () => {
                    // 如果正在處理答對的動畫，就不允許再次點擊
                    if (isProcessing) return; 

                    if (val === product) {
                        isProcessing = true; // 答對了，鎖定按鈕！
                        document.getElementById('dropTarget').innerText = val;
                        
                        triggerConfetti();
                        speak(`太棒了！${val}。你答對了！`);
                        
                        // 死板地等 3 秒換下一題，不再依賴語音有沒有唸完
                        setTimeout(() => {
                            generateQuestion();
                        }, 3000);

                    } else {
                        speak("再試試看喔！");
                    }
                };
                document.getElementById('options').appendChild(div);
            });
        }
    </script>
</body>
</html>
